<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cardia Studio — Premium Business Card Generator</title>
    <meta
      name="description"
      content="Design premium front-and-back business cards with live preview, QR codes, brand styles, and print-ready export."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@500;600;700&family=Source+Serif+4:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Public+Sans:wght@400;500;600;700;800&family=Sora:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/templates.css" />
    <link rel="stylesheet" href="css/print.css" media="print" />
  </head>
  <body>
    <header class="app-header" role="banner">
      <div>
        <p class="eyebrow">Cardia Studio</p>
        <h1>Premium Business Card Generator</h1>
      </div>
      <div class="header-actions">
        <button id="savePreset" class="btn btn-subtle" type="button">Save Draft</button>
        <button id="resetCard" class="btn btn-subtle" type="button">Reset</button>
        <button id="printCard" class="btn btn-primary" type="button">Print / PDF</button>
        <button id="exportCard" class="btn btn-primary" type="button">Export PNG</button>
      </div>
    </header>

    <main class="app-main">
      <section class="control-panel" aria-label="Business card configuration">
        <form id="cardForm" novalidate>
          <fieldset>
            <legend>Professional Identity</legend>
            <div class="form-grid">
              <label>
                Full Name
                <input name="fullName" type="text" maxlength="60" placeholder="Dr. Amelia Reyes" />
              </label>
              <label>
                Title
                <input name="title" type="text" maxlength="90" placeholder="Forensic Psychologist" />
              </label>
              <label>
                Company / Practice
                <input name="company" type="text" maxlength="90" placeholder="Northbridge Behavioral Lab" />
              </label>
              <label>
                Tagline
                <input name="tagline" type="text" maxlength="110" placeholder="Clarity in complex decisions." />
              </label>
            </div>
          </fieldset>

          <fieldset>
            <legend>Contact and Credentials</legend>
            <div class="form-grid">
              <label>
                Phone
                <input name="phone" type="tel" maxlength="40" placeholder="+1 (202) 555-0147" />
              </label>
              <label>
                Email
                <input name="email" type="email" maxlength="90" placeholder="amelia@northbridgelab.com" />
              </label>
              <label>
                Website
                <input name="website" type="url" maxlength="120" placeholder="https://northbridgelab.com" />
              </label>
              <label>
                Address
                <input name="address" type="text" maxlength="120" placeholder="420 Madison Ave, New York" />
              </label>
              <label>
                License / Specialty
                <input name="credential" type="text" maxlength="100" placeholder="PsyD, ABPP Forensic" />
              </label>
              <label>
                LinkedIn / Profile URL
                <input name="profileUrl" type="url" maxlength="120" placeholder="https://linkedin.com/in/ameliareyes" />
              </label>
            </div>
          </fieldset>

          <fieldset>
            <legend>Visual Direction</legend>
            <div class="form-grid">
              <label>
                Premium Template
                <select name="template" id="templateSelect">
                  <option value="executive-corporate">Executive Corporate</option>
                  <option value="editorial-minimal">Editorial Minimal</option>
                  <option value="modern-creative">Modern Creative</option>
                  <option value="tech-professional">Tech Professional</option>
                  <option value="health-wellness">Health and Wellness</option>
                  <option value="prestige-dark">Prestige Dark</option>
                  <option value="forensic-psychology">Forensic Psychology Professional</option>
                  <option value="software-architect">Senior Software Architect</option>
                  <option value="legal-institutional">Legal and Institutional</option>
                </select>
              </label>
              <label>
                Typography
                <select name="typeScale" id="fontSelect">
                  <option value="inter">Inter + Source Serif</option>
                  <option value="manrope">Manrope + Playfair Display</option>
                  <option value="plex">IBM Plex Sans + Source Serif</option>
                  <option value="space">Space Grotesk + Public Sans</option>
                  <option value="sora">Sora + Inter</option>
                </select>
              </label>
              <label>
                Brand Primary
                <input name="brandPrimary" type="color" value="#14213d" />
              </label>
              <label>
                Brand Accent
                <input name="brandAccent" type="color" value="#d4a373" />
              </label>
              <label class="full-width">
                Notes / Back Message
                <textarea name="backNote" rows="3" maxlength="240" placeholder="By appointment only · Confidential consultations · Available in-person & remote"></textarea>
              </label>
            </div>
          </fieldset>

          <fieldset>
            <legend>Media and QR</legend>
            <div class="form-grid">
              <label>
                Logo Upload
                <input name="logo" id="logoInput" type="file" accept="image/*" />
              </label>
              <label>
                Profile Image (optional)
                <input name="avatar" id="avatarInput" type="file" accept="image/*" />
              </label>
              <label>
                QR Target URL
                <input name="qrValue" type="url" maxlength="140" placeholder="https://cal.com/amelia-reyes" />
              </label>
              <label>
                Show QR on Back
                <select name="showQr">
                  <option value="yes">Yes</option>
                  <option value="no">No</option>
                </select>
              </label>
            </div>
          </fieldset>
        </form>
      </section>

      <section class="preview-panel" aria-label="Live card preview">
        <div class="preview-toolbar">
          <button class="btn btn-subtle preview-toggle active" type="button" data-side="front">Front</button>
          <button class="btn btn-subtle preview-toggle" type="button" data-side="back">Back</button>
        </div>

        <div class="card-stage" id="captureArea">
          <article id="cardFront" class="business-card side-front" aria-label="Business card front preview">
            <div class="card-layer overlay"></div>
            <header class="front-header">
              <div class="logo-shell"><img id="logoPreview" alt="Uploaded logo" /></div>
              <p id="companyPreview" class="company"></p>
            </header>
            <div class="identity-block">
              <img id="avatarPreview" class="avatar" alt="Profile image" />
              <div>
                <h2 id="namePreview"></h2>
                <p id="titlePreview" class="title"></p>
                <p id="credentialPreview" class="credential"></p>
              </div>
            </div>
            <p id="taglinePreview" class="tagline"></p>
            <footer class="contact-grid">
              <p id="phonePreview"></p>
              <p id="emailPreview"></p>
              <p id="webPreview"></p>
              <p id="addressPreview"></p>
            </footer>
          </article>

          <article id="cardBack" class="business-card side-back is-hidden" aria-label="Business card back preview">
            <div class="card-layer overlay"></div>
            <div class="back-top">
              <p id="backCompanyPreview" class="company"></p>
              <p id="backNamePreview" class="name"></p>
            </div>
            <p id="backNotePreview" class="back-note"></p>
            <div class="back-footer">
              <div id="qrContainer" class="qr-box" aria-label="QR code block"></div>
              <div class="meta">
                <p id="profilePreview"></p>
                <p id="backWebsitePreview"></p>
              </div>
            </div>
          </article>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
